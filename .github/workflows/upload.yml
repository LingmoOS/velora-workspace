name: Build

permissions: write-all

on:
  push:
    branches: [ main ]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [ main ]

jobs:
  debian:
    name: Debian Testing
    runs-on: ubuntu-latest
    container: docker.io/library/debian:testing
    steps:
      - name: Install Dependencies
        run: |
          apt-get update
          apt-get install -y sudo git ca-certificates
          apt-get install -y equivs curl git devscripts debhelper lintian build-essential automake autotools-dev cmake g++ gnupg2 curl
      
      - name: Checkout Source
        uses: actions/checkout@v4
      
      - name: Add Repository
        run: |
          echo 'deb http://download.opensuse.org/repositories/home:/LingmoOS/Debian_Testing/ /' | tee /etc/apt/sources.list.d/home:LingmoOS.list
          curl -fsSL https://download.opensuse.org/repositories/home:LingmoOS/Debian_Testing/Release.key | gpg --dearmor | tee /etc/apt/trusted.gpg.d/home_LingmoOS.gpg > /dev/null

      - name: Update repository
        run: apt-get update -y

      # - name: Install build dependencies
      #   run: apt build-dep . || true

      - name: Build source package
        run: |
          dpkg-buildpackage -S -us -uc -d
      
      - name: Collect files
        run: |
          mkdir -p src-tar-output
          mv ../*.dsc ../*.tar.* src-tar-output/

      - name: Upload
        uses: LingmoOS/action-upload-to-obs@0.0.4
        with:
          remove-old-sources: true
          obs-package-name: 'velora-workspace'
          obs-project-name: 'home:LingmoOS'
          obs-user-name: ${{ secrets.OBS_USERNAME }}
          obs-password: ${{ secrets.OBS_TOKEN }}
          obs-instance-url: 'https://api.opensuse.org'
          local-package-dir: './src-tar-output'